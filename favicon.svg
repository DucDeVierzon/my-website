<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="penguinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="50%" style="stop-color:#48dbfb"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
  </defs>
  <!-- Penguin body -->
  <ellipse cx="50" cy="65" rx="22" ry="28" fill="url(#penguinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Penguin belly -->
  <ellipse cx="50" cy="55" rx="16" ry="20" fill="white" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Penguin head -->
  <circle cx="50" cy="35" r="14" fill="url(#penguinGrad)" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Beak -->
  <path d="M60 35 L70 32 L60 29 Z" fill="#ffd93d" stroke="#1a1a2e" stroke-width="0.8"/>
  <!-- Eyes -->
  <circle cx="46" cy="33" r="2.5" fill="white" stroke="#1a1a2e" stroke-width="0.8"/>
  <circle cx="54" cy="33" r="2.5" fill="white" stroke="#1a1a2e" stroke-width="0.8"/>
  <circle cx="46" cy="33" r="1" fill="#1a1a2e"/>
  <circle cx="54" cy="33" r="1" fill="#1a1a2e"/>
  <!-- Feet -->
  <ellipse cx="42" cy="85" rx="4" ry="7" fill="#ffd93d" stroke="#1a1a2e" stroke-width="0.8"/>
  <ellipse cx="58" cy="85" rx="4" ry="7" fill="#ffd93d" stroke="#1a1a2e" stroke-width="0.8"/>
</svg>
